extract_paper_notes_task:
  description: >
    Read the following academic paper text for "{paper_title}".

    PAPER TEXT:
    {paper_text}

    Extract only source-grounded notes.
    When the paper is long, use the section extractor tool to inspect likely sections such as:
    abstract, introduction, method, experiment, results, and conclusion.

    Produce a concise markdown note sheet with these exact headings:
    1. Metadata
    2. Research Problem
    3. Core Method
    4. Datasets
    5. Experimental Setup
    6. Main Results

    Rules:
    - Do not fabricate authors, venue, year, datasets, or numeric results.
    - If some information is missing, explicitly write "Not clearly stated".
    - Prefer short factual sentences over long prose.
  expected_output: >
    A compact markdown note sheet with the six required headings and only source-grounded content.
  agent: reader

synthesize_analysis_task:
  description: >
    Use the previous task's note sheet and the same paper text for "{paper_title}" to produce the final analysis.

    PAPER TEXT:
    {paper_text}

    Before making uncertain claims, use the keyword search tool to verify evidence in the paper text.

    You must produce a final structured analysis with these fields:
    - metadata: title, authors, venue, year
    - extracted_notes: research_problem, core_method, datasets, experimental_setup, main_results
    - novelty
    - strengths
    - limitations
    - reproducibility
    - interview_pitch

    Rules:
    - Keep all judgments grounded in the paper.
    - For missing metadata or uncertain items, use empty strings or empty lists rather than inventing content.
    - "strengths" and "limitations" must be short bullet-style phrases.
    - "interview_pitch" should be 3 to 5 sentences and suitable for talking about this paper in an interview or project demo.
  expected_output: >
    A structured paper analysis object with metadata, extracted notes, novelty, strengths, limitations,
    reproducibility, and interview_pitch.
  agent: analyst